<!DOCTYPE html>

<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light only">
<title>Gangetabell-Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light only;
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --primary: #FF6B4A;
    --primary-light: #FF8A70;
    --correct: #4ECB71;
    --correct-light: #E8F9ED;
    --wrong: #FF5A5A;
    --wrong-light: #FFE8E8;
    --text: #2D2B3D;
    --text-light: #8886A0;
    --accent-1: #FFD93D;
    --accent-2: #6BCB77;
    --accent-3: #4D96FF;
    --accent-4: #FF6B9D;
    --shadow: 0 4px 20px rgba(45,43,61,0.08);
    --shadow-lg: 0 8px 40px rgba(45,43,61,0.12);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html {
background-color: #FFF8F0 !important;
}

body {
font-family: ‘Nunito’, sans-serif;
background: #FFF8F0 !important;
background-color: #FFF8F0 !important;
color: #2D2B3D !important;
min-height: 100dvh;
overflow-x: hidden;
}

/* Floating background shapes */
body::before, body::after {
content: ‘’;
position: fixed;
border-radius: 50%;
z-index: 0;
opacity: 0.15;
pointer-events: none;
}
body::before {
width: 300px; height: 300px;
background: #FFD93D;
top: -80px; right: -80px;
animation: float 8s ease-in-out infinite;
}
body::after {
width: 200px; height: 200px;
background: #4D96FF;
bottom: -60px; left: -60px;
animation: float 10s ease-in-out infinite reverse;
}

@keyframes float {
0%, 100% { transform: translate(0, 0) scale(1); }
50% { transform: translate(20px, 20px) scale(1.05); }
}

.app {
position: relative;
z-index: 1;
max-width: 540px;
margin: 0 auto;
padding: 20px 16px 40px;
min-height: 100dvh;
display: flex;
flex-direction: column;
}

/* ── Header ── */
.header {
text-align: center;
padding: 16px 0 12px;
}
.header h1 {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 2rem;
background: linear-gradient(135deg, #FF6B4A, #FF6B9D);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.header p {
color: #8886A0;
font-size: 0.95rem;
margin-top: 2px;
}

/* ── Screens ── */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ── Selection Screen ── */
.selection-label {
font-family: ‘Fredoka’, sans-serif;
font-weight: 600;
font-size: 1.15rem;
margin: 16px 0 12px;
text-align: center;
}

.select-actions {
display: flex;
gap: 8px;
justify-content: center;
margin-bottom: 16px;
}
.select-actions button {
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
font-size: 0.82rem;
padding: 6px 16px;
border-radius: 20px;
border: 2px solid #FF6B4A;
background: transparent;
color: #FF6B4A;
cursor: pointer;
transition: all 0.2s;
}
.select-actions button:hover {
background: #FF6B4A;
color: #fff;
}

.table-grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 10px;
margin-bottom: 20px;
}

.table-btn {
aspect-ratio: 1;
border-radius: 16px;
border: 2.5px solid #E8E6F0;
background: #FFFFFF;
font-family: ‘Fredoka’, sans-serif;
font-weight: 600;
font-size: 1.5rem;
color: #2D2B3D;
cursor: pointer;
transition: all 0.2s;
box-shadow: 0 2px 8px rgba(0,0,0,0.04);
display: flex;
align-items: center;
justify-content: center;
position: relative;
overflow: hidden;
user-select: none;
}
.table-btn::after {
content: ‘×’;
position: absolute;
top: 2px; right: 6px;
font-size: 0.7rem;
color: #8886A0;
opacity: 0.5;
}
.table-btn.selected {
border-color: #FF6B4A;
background: linear-gradient(135deg, #FF6B4A, #FF8A70);
color: #fff;
box-shadow: 0 4px 16px rgba(255,107,74,0.3);
transform: scale(1.02);
}
.table-btn.selected::after { opacity: 0; }
.table-btn:active { transform: scale(0.95); }

.question-count {
text-align: center;
margin-bottom: 16px;
}
.question-count label {
font-weight: 700;
font-size: 0.9rem;
color: #8886A0;
}
.count-selector {
display: flex;
gap: 8px;
justify-content: center;
margin-top: 8px;
}
.count-btn {
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
font-size: 0.95rem;
padding: 8px 18px;
border-radius: 12px;
border: 2px solid #E8E6F0;
background: #FFFFFF;
color: #2D2B3D;
cursor: pointer;
transition: all 0.2s;
}
.count-btn.selected {
border-color: #4D96FF;
background: #4D96FF;
color: #fff;
}

.start-btn {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 1.2rem;
padding: 16px;
border: none;
border-radius: 20px;
background: linear-gradient(135deg, #FF6B4A, #FF6B9D);
color: #fff;
cursor: pointer;
box-shadow: 0 6px 24px rgba(255,107,74,0.35);
transition: all 0.25s;
margin-top: auto;
letter-spacing: 0.5px;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,107,74,0.45); }
.start-btn:active { transform: scale(0.97); }
.start-btn:disabled {
opacity: 0.4;
cursor: not-allowed;
transform: none;
box-shadow: none;
}

/* ── Quiz Screen ── */
.progress-bar {
height: 8px;
border-radius: 4px;
background: #E8E6F0;
margin-bottom: 12px;
overflow: hidden;
}
.progress-fill {
height: 100%;
border-radius: 4px;
background: linear-gradient(90deg, #4D96FF, #6BCB77);
transition: width 0.4s ease;
}

.quiz-info {
display: flex;
justify-content: space-between;
font-weight: 700;
font-size: 0.85rem;
color: #8886A0;
margin-bottom: 24px;
}

.score-display {
display: flex;
align-items: center;
gap: 4px;
}
.score-display .correct-count { color: #4ECB71; }
.score-display .wrong-count { color: #FF5A5A; }

.question-card {
background: #FFFFFF;
border-radius: 24px;
padding: 32px 24px;
text-align: center;
box-shadow: 0 8px 40px rgba(45,43,61,0.12);
margin-bottom: 24px;
animation: slideUp 0.35s ease;
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.question-text {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 2.8rem;
color: #2D2B3D;
line-height: 1.2;
}
.question-text .operator {
color: #FF6B4A;
margin: 0 4px;
}
.question-text .equals {
color: #4D96FF;
margin: 0 4px;
}
.question-text .qmark {
color: #FFD93D;
font-size: 3rem;
}

.answer-input-wrap {
margin-top: 20px;
display: flex;
justify-content: center;
gap: 12px;
align-items: center;
}

.answer-input {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 2.2rem;
width: 130px;
text-align: center;
padding: 10px 16px;
border: 3px solid #E8E6F0;
border-radius: 16px;
background: #FFF8F0;
color: #2D2B3D;
outline: none;
transition: border-color 0.2s;
-moz-appearance: textfield;
}
.answer-input:focus { border-color: #4D96FF; }
.answer-input.correct { border-color: #4ECB71; background: #E8F9ED; }
.answer-input.wrong { border-color: #FF5A5A; background: #FFE8E8; }

.submit-btn {
width: 56px; height: 56px;
border-radius: 50%;
border: none;
background: linear-gradient(135deg, #4D96FF, #6BCB77);
color: #fff;
font-size: 1.5rem;
cursor: pointer;
box-shadow: 0 4px 16px rgba(77,150,255,0.3);
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
flex-shrink: 0;
}
.submit-btn:hover { transform: scale(1.05); }
.submit-btn:active { transform: scale(0.95); }

.feedback {
text-align: center;
font-family: ‘Fredoka’, sans-serif;
font-weight: 600;
font-size: 1.2rem;
min-height: 36px;
margin-bottom: 12px;
transition: all 0.2s;
}
.feedback.correct { color: #4ECB71; }
.feedback.wrong { color: #FF5A5A; }

.streak {
text-align: center;
font-size: 0.85rem;
color: #8886A0;
font-weight: 600;
}
.streak .fire { font-size: 1rem; }

/* ── Result Screen ── */
.result-card {
background: #FFFFFF;
border-radius: 24px;
padding: 36px 24px;
text-align: center;
box-shadow: 0 8px 40px rgba(45,43,61,0.12);
margin: 20px 0;
animation: slideUp 0.4s ease;
}

.result-emoji {
font-size: 4rem;
margin-bottom: 8px;
}

.result-title {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 1.6rem;
margin-bottom: 4px;
}

.result-subtitle {
color: #8886A0;
font-size: 0.95rem;
margin-bottom: 20px;
}

.result-stats {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 12px;
margin-bottom: 8px;
}

.stat-box {
background: #FFF8F0;
border-radius: 16px;
padding: 14px 8px;
}
.stat-box .num {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 1.8rem;
}
.stat-box .label {
font-size: 0.75rem;
font-weight: 700;
color: #8886A0;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.stat-box.green .num { color: #4ECB71; }
.stat-box.red .num { color: #FF5A5A; }
.stat-box.blue .num { color: #4D96FF; }

.wrong-list {
text-align: left;
margin: 16px 0;
background: #FFE8E8;
border-radius: 16px;
padding: 16px;
}
.wrong-list h3 {
font-family: ‘Fredoka’, sans-serif;
font-size: 0.95rem;
color: #FF5A5A;
margin-bottom: 8px;
}
.wrong-list ul {
list-style: none;
display: flex;
flex-wrap: wrap;
gap: 6px;
}
.wrong-list li {
background: #fff;
border-radius: 10px;
padding: 4px 12px;
font-family: ‘Fredoka’, sans-serif;
font-weight: 600;
font-size: 0.95rem;
color: #2D2B3D;
}

.result-actions {
display: flex;
gap: 10px;
margin-top: 20px;
}
.result-actions button {
flex: 1;
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 1rem;
padding: 14px;
border-radius: 16px;
border: none;
cursor: pointer;
transition: all 0.2s;
}
.btn-again {
background: linear-gradient(135deg, #FF6B4A, #FF6B9D);
color: #fff;
box-shadow: 0 4px 16px rgba(255,107,74,0.3);
}
.btn-home {
background: #E8E6F0;
color: #2D2B3D;
}

/* ── Quiz Top Bar ── */
.quiz-top-bar {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 8px;
}

.icon-btn {
background: #FFFFFF;
border: 2px solid #E8E6F0;
border-radius: 14px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}
.icon-btn:active { transform: scale(0.92); }

.back-icon {
width: 44px; height: 44px;
color: #8886A0;
padding: 0;
}
.back-icon:active { color: #FF6B4A; }

.hint-btn {
height: 44px;
padding: 0 14px;
gap: 6px;
border-color: rgba(255,217,61,0.4);
background: linear-gradient(135deg, #FFFBEA, #FFF8E0);
}
.hint-btn:active { background: #FFF3C4; }
.hint-btn.disabled {
opacity: 0.4;
pointer-events: none;
}
.hint-icon { font-size: 1.15rem; }
.hint-count {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 0.9rem;
color: #2D2B3D;
background: #FFD93D;
width: 22px; height: 22px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
}

/* ── Hint Overlay ── */
.hint-overlay {
position: fixed;
inset: 0;
background: rgba(45,43,61,0.45);
backdrop-filter: blur(4px);
-webkit-backdrop-filter: blur(4px);
z-index: 900;
display: none;
align-items: center;
justify-content: center;
padding: 24px;
pointer-events: none;
}
.hint-overlay.visible { display: flex; pointer-events: auto; animation: fadeIn 0.2s ease; }

@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}

.hint-card {
background: #FFFFFF;
border-radius: 24px;
padding: 20px 20px 24px;
box-shadow: 0 8px 40px rgba(45,43,61,0.12);
max-width: 340px;
width: 100%;
animation: slideUp 0.25s ease;
}

.hint-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 16px;
}
.hint-title {
font-family: ‘Fredoka’, sans-serif;
font-weight: 700;
font-size: 1.15rem;
color: #2D2B3D;
}
.hint-close {
width: 32px; height: 32px;
border-radius: 50%;
border: none;
background: #F0EEF6;
color: #8886A0;
font-size: 1rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
}
.hint-close:active { background: #E0DEE8; }

.hint-table {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px;
}
.hint-row {
font-family: ‘Fredoka’, sans-serif;
font-weight: 500;
font-size: 1.05rem;
color: #2D2B3D;
background: #FFF8F0;
border-radius: 10px;
padding: 8px 14px;
text-align: center;
}
.hint-row.highlight {
background: linear-gradient(135deg, rgba(255,107,74,0.12), rgba(255,107,157,0.12));
font-weight: 700;
color: #FF6B4A;
}

/* ── Custom Numpad ── */
.numpad {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
width: 100%;
margin: 0 auto;
padding: 0 4px;
}

.numpad-btn {
font-family: ‘Fredoka’, sans-serif;
font-weight: 600;
font-size: 1.6rem;
padding: 14px 0;
border: 2.5px solid #E8E6F0;
border-radius: 16px;
background: #FFFFFF;
color: #2D2B3D;
cursor: pointer;
transition: all 0.12s;
box-shadow: 0 2px 8px rgba(0,0,0,0.04);
user-select: none;
display: flex;
align-items: center;
justify-content: center;
-webkit-tap-highlight-color: transparent;
}
.numpad-btn:active {
transform: scale(0.93);
background: #F0EEF6;
}
.numpad-btn.action-delete {
font-size: 1.4rem;
color: #FF5A5A;
border-color: rgba(255,90,90,0.2);
background: #FFE8E8;
}
.numpad-btn.action-delete:active {
background: #ffd4d4;
}
.numpad-btn.action-ok {
font-size: 1.3rem;
font-weight: 700;
color: #fff;
background: linear-gradient(135deg, #4D96FF, #6BCB77);
border-color: transparent;
box-shadow: 0 4px 16px rgba(77,150,255,0.25);
}
.numpad-btn.action-ok:active {
transform: scale(0.93);
box-shadow: 0 2px 8px rgba(77,150,255,0.2);
}

/* Confetti */
.confetti-container {
position: fixed; top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none; z-index: 999; overflow: hidden;
}
.confetti-piece {
position: absolute;
width: 10px; height: 10px;
top: -20px;
animation: confetti-fall 2.5s ease-in forwards;
}
@keyframes confetti-fall {
0% { transform: translateY(0) rotate(0deg); opacity: 1; }
100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* Responsive */
@media (min-width: 600px) {
.app { padding: 32px 24px 48px; }
.header h1 { font-size: 2.4rem; }
.question-text { font-size: 3.2rem; }
}

@media (max-width: 360px) {
.table-grid { gap: 6px; }
.table-btn { font-size: 1.2rem; border-radius: 12px; }
.question-text { font-size: 2.2rem; }
.answer-input { font-size: 1.8rem; width: 110px; }
}
</style>

</head>

  let hintsLeft = 3;

  const counts = [5, 10, 15, 20];
  const encouragements = ['Fantastisk!', 'Helt riktig!', 'Supert!', 'Bra jobba!', 'Knallbra!', 'Perfekt!', 'Wow!', 'Ja!'];
  const wrongMessages = ['Nesten!', 'Ikke helt…', 'Prøv igjen neste gang!', 'Øvelse gjør mester!'];

  // ── Init ──
  function init() {
    const grid = document.getElementById('tableGrid');
    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement('button');
      btn.className = 'table-btn';
      btn.textContent = i;
      btn.onclick = () => toggleTable(i, btn);
      grid.appendChild(btn);
    }

    const cs = document.getElementById('countSelector');
    counts.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'count-btn' + (c === 10 ? ' selected' : '');
      btn.textContent = c;
      btn.onclick = () => {
        questionCount = c;
        cs.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      cs.appendChild(btn);
    });
  }

  function toggleTable(n, btn) {
    if (selectedTables.has(n)) {
      selectedTables.delete(n);
      btn.classList.remove('selected');
    } else {
      selectedTables.add(n);
      btn.classList.add('selected');
    }
    document.getElementById('startBtn').disabled = selectedTables.size === 0;
  }

  function selectAll() {
    document.querySelectorAll('.table-btn').forEach((btn, i) => {
      selectedTables.add(i + 1);
      btn.classList.add('selected');
    });
    document.getElementById('startBtn').disabled = false;
  }

  function deselectAll() {
    document.querySelectorAll('.table-btn').forEach((btn, i) => {
      selectedTables.delete(i + 1);
      btn.classList.remove('selected');
    });
    document.getElementById('startBtn').disabled = true;
  }

  // ── Quiz Logic ──
  function generateQuestions() {
    const pool = [];
    selectedTables.forEach(t => {
      for (let i = 1; i <= 10; i++) {
        pool.push({ a: t, b: i, answer: t * i });
      }
    });
    // Shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, questionCount);
  }

  function startQuiz() {
    questions = generateQuestions();
    currentQ = 0; correct = 0; wrong = 0; streak = 0; bestStreak = 0;
    wrongAnswers = [];
    hintsLeft = 3;
    updateHintBtn();
    showScreen('quizScreen');
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = questions[currentQ];
    const qt = document.getElementById('questionText');
    qt.innerHTML = `${q.a} <span class="operator">×</span> ${q.b} <span class="equals">=</span> <span class="qmark">?</span>`;

    document.getElementById('questionNum').textContent = `${currentQ + 1} / ${questions.length}`;
    document.getElementById('progressFill').style.width = `${((currentQ) / questions.length) * 100}%`;
    document.getElementById('correctCount').textContent = `${correct} ✓`;
    document.getElementById('wrongCount').textContent = `${wrong} ✗`;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';

    const input = document.getElementById('answerInput');
    input.value = '';
    input.className = 'answer-input';
    input.disabled = false;

    updateStreak();
    // Re-animate card
    const card = document.getElementById('questionCard');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = '';
  }

  function checkAnswer() {
    if (answered) {
      nextQuestion();
      return;
    }
    const input = document.getElementById('answerInput');
    const userAnswer = parseInt(input.value);
    if (isNaN(userAnswer)) return;

    answered = true;
    const q = questions[currentQ];
    const fb = document.getElementById('feedback');

    if (userAnswer === q.answer) {
      correct++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      input.classList.add('correct');
      fb.textContent = encouragements[Math.floor(Math.random() * encouragements.length)];
      fb.className = 'feedback correct';
    } else {
      wrong++;
      streak = 0;
      input.classList.add('wrong');
      fb.textContent = `${wrongMessages[Math.floor(Math.random() * wrongMessages.length)]} ${q.a} × ${q.b} = ${q.answer}`;
      fb.className = 'feedback wrong';
      wrongAnswers.push(q);
    }

    input.disabled = true;
    document.getElementById('correctCount').textContent = `${correct} ✓`;
    document.getElementById('wrongCount').textContent = `${wrong} ✗`;
    updateStreak();

    // Auto advance — longer pause on wrong so they can read the answer
    const isCorrect = userAnswer === q.answer;
    setTimeout(nextQuestion, isCorrect ? 1200 : 3200);
  }

  function nextQuestion() {
    if (!answered) return;
    currentQ++;
    if (currentQ >= questions.length) {
      showResults();
    } else {
      showQuestion();
    }
  }

  function updateStreak() {
    const el = document.getElementById('streak');
    if (streak >= 3) {
      el.innerHTML = `<span class="fire">🔥</span> ${streak} på rad!`;
    } else {
      el.textContent = '';
    }
  }

  // ── Results ──
  function showResults() {
    showScreen('resultScreen');
    const pct = Math.round((correct / questions.length) * 100);

    document.getElementById('statCorrect').textContent = correct;
    document.getElementById('statWrong').textContent = wrong;
    document.getElementById('statPercent').textContent = pct + '%';

    let emoji, title, subtitle;
    if (pct === 100) {
      emoji = '🏆'; title = 'Perfekt!'; subtitle = 'Du er en ekte gangemester!';
      launchConfetti();
    } else if (pct >= 80) {
      emoji = '🌟'; title = 'Kjempebra!'; subtitle = 'Nesten perfekt — fortsett sånn!';
      launchConfetti();
    } else if (pct >= 60) {
      emoji = '💪'; title = 'Bra jobba!'; subtitle = 'Øv litt mer, så knekker du det!';
    } else {
      emoji = '📚'; title = 'Godt forsøk!'; subtitle = 'Øvelse gjør mester — prøv igjen!';
    }

    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultSubtitle').textContent = subtitle;

    const wl = document.getElementById('wrongAnswersList');
    if (wrongAnswers.length > 0) {
      wl.innerHTML = `<div class="wrong-list"><h3>Øv ekstra på:</h3><ul>${
        wrongAnswers.map(q => `<li>${q.a} × ${q.b} = ${q.answer}</li>`).join('')
      }</ul></div>`;
    } else {
      wl.innerHTML = '';
    }

    document.getElementById('progressFill').style.width = '100%';
  }

  function launchConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = ['#FF6B4A','#FFD93D','#6BCB77','#4D96FF','#FF6B9D','#A66CFF'];
    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 1.5 + 's';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 4000);
  }

  // ── Navigation ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goHome() {
    showScreen('selectScreen');
  }

  function confirmGoHome() {
    goHome();
  }

  // ── Hints ──
  function updateHintBtn() {
    const btn = document.getElementById('hintBtn');
    document.getElementById('hintCount').textContent = hintsLeft;
    if (hintsLeft <= 0) {
      btn.classList.add('disabled');
    } else {
      btn.classList.remove('disabled');
    }
  }

  function showHint() {
    if (hintsLeft <= 0 || answered) return;
    hintsLeft--;
    updateHintBtn();

    const q = questions[currentQ];
    const tableNum = q.a;
    document.getElementById('hintTitle').textContent = `${tableNum}-gangen`;

    const table = document.getElementById('hintTable');
    table.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      const row = document.createElement('div');
      row.className = 'hint-row' + (i === q.b ? ' highlight' : '');
      row.textContent = `${tableNum} × ${i} = ${tableNum * i}`;
      table.appendChild(row);
    }

    document.getElementById('hintOverlay').classList.add('visible');
  }

  function closeHint(e) {
    if (e && e.currentTarget === document.getElementById('hintOverlay') && e.target !== e.currentTarget) return;
    document.getElementById('hintOverlay').classList.remove('visible');
  }

  function playAgain() {
    startQuiz();
  }

  // ── Numpad ──
  function numpadPress(key) {
    const input = document.getElementById('answerInput');
    if (key === 'ok') {
      checkAnswer();
      return;
    }
    if (answered) return;
    if (key === 'del') {
      input.value = input.value.slice(0, -1);
      return;
    }
    // Max 3 digits (100 is max answer)
    if (input.value.length < 3) {
      input.value += key;
    }
  }

  // ── Keyboard (for PC) ──
  document.addEventListener('keydown', e => {
    if (!document.getElementById('quizScreen').classList.contains('active')) return;
    if (e.key === 'Enter') {
      checkAnswer();
    } else if (e.key === 'Backspace') {
      if (!answered) {
        const input = document.getElementById('answerInput');
        input.value = input.value.slice(0, -1);
      }
    } else if (/^[0-9]$/.test(e.key) && !answered) {
      const input = document.getElementById('answerInput');
      if (input.value.length < 3) input.value += e.key;
    }
  });

  init();
</script>

</body>
</html>
